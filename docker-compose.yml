networks:
  comms-net:
    driver: bridge
  egress-net:
    driver: bridge
  search-net:
    driver: bridge
  data-net:
    internal: true  # no host routing — port publishing is silently ignored on internal networks
    driver: bridge
  admin-net:
    driver: bridge  # non-internal bridge so Infisical can publish its management port

services:
  bot:
    build: .
    restart: unless-stopped
    networks:
      - comms-net
      - egress-net
      - search-net
      - data-net
    environment:
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_URL: http://infisical:8080
      EGRESS_URL: http://egressguard:8000
      COMMS_URL: http://comms:8001
      SEARXNG_URL: http://searxng:8080
    depends_on:
      db:
        condition: service_healthy
      egressguard:
        condition: service_started
      comms:
        condition: service_started
      infisical:
        condition: service_started

  egressguard:
    build: ./services/egressguard
    restart: unless-stopped
    networks:
      - egress-net
    environment:
      COMMS_URL: http://comms:8001
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      comms:
        condition: service_started

  comms:
    build: ./services/comms
    restart: unless-stopped
    networks:
      - comms-net
      - data-net  # needs data-net to reach infisical
    ports:
      - "8001:8001"
    environment:
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_URL: http://infisical:8080
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/specialists')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    networks:
      - search-net
    volumes:
      - ./searxng:/etc/searxng
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks:
      - data-net
    environment:
      POSTGRES_DB: napyclaw
      POSTGRES_USER: napyclaw
      POSTGRES_PASSWORD: napyclaw-local
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./napyclaw/migrations/001_thoughts.sql:/docker-entrypoint-initdb.d/001_thoughts.sql
      - ./napyclaw/migrations/002_operational.sql:/docker-entrypoint-initdb.d/002_operational.sql
      - ./napyclaw/migrations/003_webchat.sql:/docker-entrypoint-initdb.d/003_webchat.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U napyclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - data-net

  infisical:
    image: infisical/infisical:latest
    restart: unless-stopped
    networks:
      - data-net
      - admin-net  # admin-net allows the 8888:8080 port mapping to work
    environment:
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      DB_CONNECTION_URI: postgresql://napyclaw:napyclaw-local@db:5432/napyclaw
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8888:8080"

  # Tailscale sidecar — exposes comms on the tailnet so anyone on your tailnet can reach the webchat UI.
  # Add TS_AUTHKEY to Infisical (prod env). Generate a key at tailscale.com/settings/keys.
  # Use an ephemeral key so the tailnet node is cleaned up when the container stops.
  # Once running, reach the UI at http://<tailscale-ip>:8001
  comms-tailscale:
    build: ./services/comms-tailscale
    restart: unless-stopped
    network_mode: service:comms  # shares comms network namespace so TS proxies comms traffic
    environment:
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_URL: http://infisical:8080
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    depends_on:
      comms:
        condition: service_healthy
      infisical:
        condition: service_started

volumes:
  pgdata:
  tailscale-state:
