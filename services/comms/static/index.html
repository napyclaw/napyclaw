<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>napyclaw</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f172a;
    --surface:   #1e293b;
    --border:    #334155;
    --accent:    #1d4ed8;
    --accent-lt: #93c5fd;
    --text:      #e2e8f0;
    --muted:     #94a3b8;
    --danger:    #f87171;
    --sidebar-w: 210px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text);
               font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }

  #app { display: flex; height: 100vh; overflow: hidden; }

  /* --- Sidebar --- */
  #sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  #sidebar-header { padding: 14px; border-bottom: 1px solid var(--border); }
  #sidebar-header .label { color: var(--muted); font-size: 10px;
                            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  .specialist-item {
    padding: 8px 10px; border-radius: 6px; cursor: pointer; margin: 2px 0;
    transition: background .15s;
  }
  .specialist-item:hover { background: rgba(255,255,255,.05); }
  .specialist-item.active { background: var(--accent); }
  .specialist-item .name { font-weight: 600; }
  .specialist-item .role { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .specialist-item.active .role { color: var(--accent-lt); }

  #new-btn {
    display: flex; align-items: center; gap: 6px; padding: 8px 10px;
    color: var(--muted); cursor: pointer; border-radius: 6px; margin: 2px 0;
  }
  #new-btn:hover { background: rgba(255,255,255,.05); }

  #admin-section { margin-top: auto; border-top: 1px solid var(--border); padding: 10px 14px; }
  #admin-btn {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    cursor: pointer; border-radius: 6px;
  }
  #admin-btn:hover { background: rgba(255,255,255,.05); }
  #admin-btn.active { background: rgba(248,113,113,.15); }
  #admin-name { color: var(--danger); font-weight: 600; font-size: 12px; }
  #admin-badge { color: var(--danger); font-size: 11px; }

  /* --- Chat pane --- */
  #chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  #chat-header {
    background: var(--surface); padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #chat-title { font-weight: 600; }
  #chat-role { color: var(--muted); font-size: 12px; margin-left: 6px; }
  #rename-btn { margin-left: auto; color: var(--muted); font-size: 12px;
                cursor: pointer; background: none; border: none; }
  #rename-btn:hover { color: var(--text); }

  /* rename form (hidden by default) */
  #rename-form { display: none; gap: 6px; align-items: center; margin-left: auto; }
  #rename-form input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); padding: 4px 8px; font-size: 12px; width: 120px;
  }
  #rename-form button { background: var(--accent); color: var(--text); border: none;
                        border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 12px; }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 10px;
  }

  .msg { display: flex; gap: 8px; align-items: flex-start; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--accent); }

  .bubble {
    padding: 8px 12px; border-radius: 12px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble { background: var(--accent); border-radius: 12px 12px 2px 12px; }
  .msg.assistant .bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px; color: #cbd5e1;
  }

  .typing-dots { display: flex; gap: 4px; padding: 10px 14px; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: bounce .8s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(.6)} 40%{transform:scale(1)} }

  /* approval card */
  .approval-card {
    background: var(--surface); border: 1px solid var(--danger);
    border-radius: 8px; padding: 12px 14px; max-width: 360px;
  }
  .approval-card h4 { color: var(--danger); margin-bottom: 8px; }
  .approval-card .domain { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  .approval-card .actions { display: flex; flex-wrap: wrap; gap: 6px; }
  .approval-card button {
    padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer; font-size: 12px;
  }
  .approval-card button:hover { background: var(--border); }
  .approval-card button.approve { border-color: #22c55e; color: #22c55e; }
  .approval-card button.deny { border-color: var(--danger); color: var(--danger); }

  /* input bar */
  #input-bar {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
  }
  #msg-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 14px; color: var(--text); font-size: 14px;
    outline: none; resize: none; line-height: 1.4; max-height: 120px;
  }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn {
    width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
    border: none; color: var(--text); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #send-btn:disabled { opacity: .4; cursor: default; }

  /* new specialist modal */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; width: 320px;
  }
  #modal h3 { margin-bottom: 14px; }
  #modal input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 8px 12px;
    font-size: 14px; margin-bottom: 12px;
  }
  #modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  #modal-actions button { padding: 7px 14px; border-radius: 6px; border: none;
                           cursor: pointer; font-size: 13px; }
  #modal-cancel { background: var(--border); color: var(--text); }
  #modal-ok { background: var(--accent); color: var(--text); }

  /* mobile: collapse sidebar */
  @media (max-width: 600px) {
    #sidebar { position: fixed; left: -100%; top: 0; height: 100%; z-index: 50;
               transition: left .2s; }
    #sidebar.open { left: 0; }
    #hamburger { display: flex; }
  }
  #hamburger { display: none; background: none; border: none; color: var(--muted);
               cursor: pointer; font-size: 20px; padding: 0 8px; }

  /* --- Backstage column --- */
  #backstage {
      width: 260px; min-width: 260px;
      background: var(--bg); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      font-size: 12px;
  }
  #backstage-sticky {
      flex-shrink: 0; border-bottom: 1px solid var(--border);
      padding: 8px; display: flex; flex-direction: column; gap: 6px;
      max-height: 40%; overflow-y: auto;
  }
  #backstage-sticky:empty::after {
      content: 'No pending items'; color: var(--muted); font-size: 11px; padding: 4px;
  }
  #backstage-turns {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
  }
  .backstage-turn {
      border-radius: 6px; border: 1px solid var(--border);
      overflow: hidden;
  }
  .backstage-turn.current { background: var(--bg); }
  .backstage-turn.focused { background: #1e3a5f; border-color: #2563eb; }
  .backstage-turn-header {
      padding: 5px 8px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      color: var(--muted); font-size: 11px;
  }
  .backstage-turn.current .backstage-turn-header { color: var(--text); }
  .backstage-turn.focused .backstage-turn-header { color: var(--accent-lt); }
  .backstage-turn-body { display: none; padding: 6px 8px; }
  .backstage-turn.open .backstage-turn-body { display: block; }
  .backstage-event { margin-bottom: 5px; line-height: 1.4; }
  .backstage-event .ev-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
  .backstage-event .ev-content { color: var(--text); margin-top: 2px; }

  /* pending approval card */
  .bs-approval {
      background: var(--surface); border: 1px solid var(--danger);
      border-radius: 6px; padding: 8px;
  }
  .bs-approval .bs-label { color: var(--danger); font-size: 10px; text-transform: uppercase; margin-bottom: 4px; }
  .bs-approval .bs-content { color: var(--text); margin-bottom: 6px; font-size: 12px; }
  .bs-approval .bs-actions { display: flex; gap: 4px; }
  .bs-approval button { padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
                         background: var(--bg); color: var(--text); cursor: pointer; font-size: 11px; }
  .bs-approval button.approve { border-color: #22c55e; color: #22c55e; }
  .bs-approval button.deny { border-color: var(--danger); color: var(--danger); }

  /* correction window card */
  .bs-queued {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px;
  }
  .bs-queued .bs-label { color: var(--muted); font-size: 10px; text-transform: uppercase; margin-bottom: 4px; }
  .bs-queued .bs-content { color: var(--text); margin-bottom: 4px; font-size: 12px; }
  .bs-queued .bs-turns { color: var(--muted); font-size: 10px; margin-bottom: 6px; }
  .bs-queued .bs-actions { display: flex; gap: 4px; align-items: center; }
  .bs-queued .bs-adjust-input { display: none; width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 4px; color: var(--text);
      padding: 4px 6px; font-size: 12px; margin-top: 4px; }
  .bs-queued button { padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
                      background: var(--bg); color: var(--text); cursor: pointer; font-size: 11px; }

  #identity-bar {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }
  #identity-name { color: var(--accent-lt); font-weight: 600; }
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="identity-bar">Logged in as <span id="identity-name">...</span></div>
    <div id="sidebar-header">
      <div class="label">Specialists</div>
      <div id="specialist-list"></div>
      <div id="new-btn" onclick="openNewModal()">
        <span style="font-size:16px">+</span> New Specialist
      </div>
    </div>
    <div id="admin-section">
      <div id="admin-btn" onclick="selectGroup('admin')">
        <span style="color:var(--danger);font-size:16px">&#9888;</span>
        <div>
          <div id="admin-name">Admin</div>
          <div id="admin-badge" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat">
    <div id="chat-header">
      <button id="hamburger" onclick="toggleSidebar()">&#9776;</button>
      <span id="chat-title">Select a specialist</span>
      <span id="chat-role"></span>
      <button id="rename-btn" onclick="openRename()" style="display:none">&#9999; rename</button>
      <form id="rename-form" onsubmit="submitRename(event)">
        <input id="rename-input" placeholder="New display name / nickname" maxlength="30">
        <button type="submit">Save</button>
      </form>
    </div>
    <div id="messages"></div>
    <div id="input-bar">
      <textarea id="msg-input" placeholder="Select a specialist to begin..."
                rows="1" disabled onkeydown="onKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>&#8593;</button>
    </div>
  </div>

  <!-- Backstage -->
  <div id="backstage">
    <div id="backstage-sticky"></div>
    <div id="backstage-turns"></div>
  </div>

</div>

<!-- New specialist modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3>New Specialist</h3>
    <input id="specialist-name-input" placeholder="Name (optional — agent can choose)" maxlength="50">
    <div id="modal-actions">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-ok" onclick="createSpecialist()">Start Chat</button>
    </div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}/ws`;
let ws = null;
let currentGroup = null;
let reconnectDelay = 1000;
// messages: { [group_id]: [{role, text, approval?}] }
const messages = {};
// specialists list fetched from server
let specialists = [];
// pending approval badge count
let pendingApprovals = 0;
// identity
let ownerName = '';

// ---- WebSocket ----

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    reconnectDelay = 1000;
    if (currentGroup) {
      ws.send(JSON.stringify({ type: 'hello', group_id: currentGroup, owner_name: ownerName }));
    }
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'message') {
      appendMessage(data.group_id, data.role || 'assistant', data.text, data.replayed);
      if (data.group_id === currentGroup) scrollToBottom();
      if (!data.replayed && (data.role === 'assistant' || (!data.role && data.group_id))) {
        bsSealTurn(data.group_id);
      }
    } else if (data.type === 'typing') {
      if (data.group_id === currentGroup) setTyping(data.on);
    } else if (data.type === 'approval') {
      appendApproval(data);
    } else if (data.type === 'context_used') {
      bsAddEvent(data.group_id, data);
    } else if (data.type === 'tool_call') {
      bsAddEvent(data.group_id, data);
    } else if (data.type === 'background_task') {
      bsAddEvent(data.group_id, data);
    } else if (data.type === 'memory_committed') {
      bsAddEvent(data.group_id, data);
    } else if (data.type === 'memory_queued') {
      _correctionWindow.push({
        token: data.token,
        entry_type: data.entry_type || data.type,
        content: data.content,
        turns_remaining: data.window_turns_remaining || 3,
      });
      renderBackstageSticky();
    } else if (data.type === 'memory_pending_approval') {
      _pendingMemoryApprovals.push(data);
      renderBackstageSticky();
    }
  };

  ws.onclose = () => {
    setTimeout(reconnect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };
}

function reconnect() { connect(); }

// ---- Identity ----

async function loadIdentity() {
  try {
    const resp = await fetch('/identity');
    const data = await resp.json();
    ownerName = data.owner_name || '';
    document.getElementById('identity-name').textContent = ownerName || 'unknown';
  } catch (e) {
    document.getElementById('identity-name').textContent = 'unknown';
  }
}

// ---- Specialists ----

async function loadSpecialists() {
  const resp = await fetch('/specialists');
  specialists = await resp.json();
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('specialist-list');
  list.innerHTML = '';
  specialists.forEach(s => {
    const div = document.createElement('div');
    div.className = 'specialist-item' + (s.group_id === currentGroup ? ' active' : '');
    div.onclick = () => selectGroup(s.group_id);
    div.innerHTML = `
      <div class="name">${esc((s.nicknames && s.nicknames[0]) || s.display_name)}</div>
      <div class="role">${esc(s.job_title || '')}</div>`;
    list.appendChild(div);
  });
  // Update admin btn active state
  document.getElementById('admin-btn').classList.toggle('active', currentGroup === 'admin');
}

function selectGroup(groupId) {
  currentGroup = groupId;
  renderSidebar();

  const spec = specialists.find(s => s.group_id === groupId)
    || (groupId === 'admin' ? { display_name: 'Admin', nicknames: ['Admin'], job_title: 'System' } : null);

  const nick = spec ? ((spec.nicknames && spec.nicknames[0]) || spec.display_name) : groupId;
  const role = spec ? (spec.job_title || '') : '';

  document.getElementById('chat-title').textContent = nick;
  document.getElementById('chat-role').textContent = role;
  document.getElementById('rename-btn').style.display = groupId === 'admin' ? 'none' : '';
  document.getElementById('msg-input').placeholder = `Message ${nick}...`;
  document.getElementById('msg-input').disabled = false;
  document.getElementById('send-btn').disabled = false;

  renderMessages(groupId);
  renderBackstage(groupId);
  renderBackstageSticky();
  scrollToBottom();

  // Request replay from server
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'hello', group_id: groupId, owner_name: ownerName }));
  }

  // Clear approval badge when entering admin
  if (groupId === 'admin') {
    pendingApprovals = 0;
    updateAdminBadge();
  }

  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
}

// ---- Messages ----

function appendMessage(groupId, role, text, replayed = false) {
  if (!messages[groupId]) messages[groupId] = [];
  // Avoid duplicating replayed messages already in buffer
  if (replayed && messages[groupId].some(m => m.text === text && m.role === role)) return;
  messages[groupId].push({ role, text });
  if (groupId === currentGroup) {
    renderMessages(groupId);
    scrollToBottom();
  }
}

function appendApproval(data) {
  if (!messages['admin']) messages['admin'] = [];
  messages['admin'].push({ role: 'approval', data });
  pendingApprovals++;
  updateAdminBadge();
  if (currentGroup === 'admin') {
    renderMessages('admin');
    scrollToBottom();
  }
}

function renderMessages(groupId) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  removeTypingIndicator();
  (messages[groupId] || []).forEach((m, i) => {
    const turnIndex = Math.floor(i / 2);
    if (m.role === 'approval') {
      container.appendChild(buildApprovalCard(m.data));
    } else {
      container.appendChild(buildBubble(m.role, m.text, turnIndex));
    }
  });
}

function buildBubble(role, text, turnIndex) {
  const wrap = document.createElement('div');
  const safeRole = (role === 'user' || role === 'assistant') ? role : 'assistant';
  wrap.className = `msg ${safeRole}`;
  if (turnIndex !== undefined) {
    wrap.dataset.turnIndex = turnIndex;
    wrap.onclick = () => focusTurnInBackstage(turnIndex);
  }
  const initial = safeRole === 'user' ? 'Y' : (currentGroup ? (currentGroup[0] || 'A').toUpperCase() : 'A');
  wrap.innerHTML = `
    <div class="avatar">${initial}</div>
    <div class="bubble">${esc(text)}</div>`;
  return wrap;
}

function focusTurnInBackstage(turnIndex) {
  const turns = document.querySelectorAll('.backstage-turn');
  turns.forEach(el => el.classList.remove('open', 'focused'));
  const target = [...turns].find(el => parseInt(el.dataset.turnIndex) === turnIndex);
  if (target) {
    target.classList.add('open', 'focused');
    focusedTurnIndex = turnIndex;
    target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function buildApprovalCard(data) {
  const div = document.createElement('div');
  div.className = 'approval-card';
  div.dataset.token = data.token;
  div.innerHTML = `
    <h4>&#9888; Egress Approval Needed</h4>
    <div class="domain">Domain: <strong>${esc(data.hostname)}</strong></div>
    <div class="actions">
      <button class="approve" onclick="respond('approve_once',this.closest('.approval-card'))">Approve Once</button>
      <button class="approve" onclick="respond('approve_always',this.closest('.approval-card'))">Approve Always</button>
      <button class="deny" onclick="respond('deny_once',this.closest('.approval-card'))">Deny Once</button>
      <button class="deny" onclick="respond('deny_always',this.closest('.approval-card'))">Deny Always</button>
    </div>`;
  return div;
}

async function respond(decision, card) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const token = card.dataset.token;
  ws.send(JSON.stringify({ type: 'approval', token, decision }));
  card.innerHTML = `<div style="color:var(--muted);font-size:12px">Decision sent: ${decision.replace('_',' ')}</div>`;
  pendingApprovals = Math.max(0, pendingApprovals - 1);
  updateAdminBadge();
}

function updateAdminBadge() {
  const badge = document.getElementById('admin-badge');
  if (pendingApprovals > 0) {
    badge.style.display = '';
    badge.textContent = `${pendingApprovals} pending approval${pendingApprovals > 1 ? 's' : ''}`;
  } else {
    badge.style.display = 'none';
  }
}

// ---- Typing indicator ----

let typingEl = null;
function setTyping(on) {
  removeTypingIndicator();
  if (on) {
    typingEl = document.createElement('div');
    typingEl.className = 'msg assistant';
    typingEl.innerHTML = `<div class="avatar">...</div>
      <div class="bubble typing-dots"><span></span><span></span><span></span></div>`;
    document.getElementById('messages').appendChild(typingEl);
    scrollToBottom();
  }
}
function removeTypingIndicator() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ---- Send ----

let _sending = false;
function sendMessage() {
  if (_sending) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentGroup || !ws || ws.readyState !== WebSocket.OPEN) return;

  _sending = true;
  setTimeout(() => { _sending = false; }, 300);

  appendMessage(currentGroup, 'user', text);
  ws.send(JSON.stringify({ type: 'message', group_id: currentGroup, text }));
  input.value = '';
  input.style.height = 'auto';
  scrollToBottom();
}

function onKey(e) {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); return; }
  // Auto-resize textarea
  const t = e.target;
  setTimeout(() => { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }, 0);
}

// ---- New specialist modal ----

function openNewModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('specialist-name-input').value = '';
  document.getElementById('specialist-name-input').focus();
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function createSpecialist() {
  const name = document.getElementById('specialist-name-input').value.trim() || '';
  const groupId = 'g-' + Date.now();
  specialists.push({ group_id: groupId, display_name: name || 'New Specialist', nicknames: name ? [name] : [], job_title: null });
  renderSidebar();
  selectGroup(groupId);
  closeModal();
  const firstMsg = name ? `Hi, I'd like to work with you as my ${name}.` : `Hi! What would you like to be called?`;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'message', group_id: groupId, display_name: name || 'New Specialist', text: firstMsg }));
    appendMessage(groupId, 'user', firstMsg);
    scrollToBottom();
  } else {
    // WS not connected — show message once reconnected via onopen
    appendMessage(groupId, 'assistant', 'Connecting... please wait a moment and try again.');
    scrollToBottom();
  }
}

// ---- Rename ----

function openRename() {
  document.getElementById('rename-btn').style.display = 'none';
  document.getElementById('rename-form').style.display = 'flex';
  document.getElementById('rename-input').focus();
}

function submitRename(e) {
  e.preventDefault();
  const newNick = document.getElementById('rename-input').value.trim();
  if (newNick && currentGroup) {
    const spec = specialists.find(s => s.group_id === currentGroup);
    if (spec) { spec.nicknames = [newNick, ...(spec.nicknames || []).slice(1)]; }
    document.getElementById('chat-title').textContent = newNick;
    renderSidebar();
  }
  document.getElementById('rename-form').style.display = 'none';
  document.getElementById('rename-btn').style.display = '';
}

// ---- Backstage ----

const backstageTurns = {};
let currentTurnIndex = 0;
let focusedTurnIndex = null;

function bsAddEvent(groupId, event) {
  if (!backstageTurns[groupId]) backstageTurns[groupId] = [];
  const turns = backstageTurns[groupId];
  if (!turns.length || turns[turns.length - 1].sealed) {
    turns.push({ index: currentTurnIndex, events: [], sealed: false });
  }
  turns[turns.length - 1].events.push(event);
  if (groupId === currentGroup) renderBackstage(groupId);
}

function bsSealTurn(groupId) {
  if (!backstageTurns[groupId]) return;
  const turns = backstageTurns[groupId];
  if (turns.length) {
    turns[turns.length - 1].sealed = true;
    currentTurnIndex++;
  }
}

function renderBackstage(groupId) {
  const turnsEl = document.getElementById('backstage-turns');
  turnsEl.innerHTML = '';
  const turns = backstageTurns[groupId] || [];
  [...turns].reverse().forEach(turn => {
    const isCurrent = !turn.sealed;
    const isFocused = turn.index === focusedTurnIndex;
    const div = document.createElement('div');
    div.className = 'backstage-turn' +
        (isCurrent ? ' current' : '') +
        (isFocused ? ' focused' : '') +
        (isCurrent || isFocused ? ' open' : '');
    div.dataset.turnIndex = turn.index;
    const header = document.createElement('div');
    header.className = 'backstage-turn-header';
    header.textContent = isCurrent ? 'Current turn' : `Turn ${turn.index + 1}`;
    header.onclick = () => toggleBackstageTurn(div, turn.index, groupId);
    const body = document.createElement('div');
    body.className = 'backstage-turn-body';
    turn.events.forEach(ev => {
      body.appendChild(buildBackstageEvent(ev));
    });
    div.appendChild(header);
    div.appendChild(body);
    turnsEl.appendChild(div);
  });
}

function toggleBackstageTurn(div, turnIndex, groupId) {
  const wasOpen = div.classList.contains('open');
  document.querySelectorAll('.backstage-turn:not(.current)').forEach(el => {
    el.classList.remove('open', 'focused');
  });
  if (!wasOpen) {
    div.classList.add('open', 'focused');
    focusedTurnIndex = turnIndex;
  } else {
    focusedTurnIndex = null;
  }
}

function buildBackstageEvent(ev) {
  const wrap = document.createElement('div');
  wrap.className = 'backstage-event';
  const label = document.createElement('div');
  label.className = 'ev-label';
  const content = document.createElement('div');
  content.className = 'ev-content';
  label.textContent = (ev.type || '').replace(/_/g, ' ');
  if (ev.tool_name) {
    content.textContent = `${ev.tool_name}: ${esc(JSON.stringify(ev.args || {}))}`;
  } else if (ev.content) {
    content.textContent = esc(ev.content);
  } else if (ev.blocks) {
    content.textContent = ev.blocks.map(b => `${b.type}: ${b.count}`).join(', ');
  } else if (ev.event) {
    content.textContent = ev.event.replace(/_/g, ' ');
  }
  wrap.appendChild(label);
  wrap.appendChild(content);
  return wrap;
}

const _pendingMemoryApprovals = [];
const _correctionWindow = [];

function renderBackstageSticky() {
  const sticky = document.getElementById('backstage-sticky');
  sticky.innerHTML = '';
  _pendingMemoryApprovals.forEach(item => {
    sticky.appendChild(buildBsApprovalCard(item));
  });
  _correctionWindow.forEach(item => {
    sticky.appendChild(buildBsQueuedCard(item));
  });
}

function buildBsApprovalCard(item) {
  const div = document.createElement('div');
  div.className = 'bs-approval';
  div.dataset.token = item.token;
  div.innerHTML = `
      <div class="bs-label">Pending: ${esc(item.entry_type || item.type || '')}</div>
      <div class="bs-content">${esc(item.content)}</div>
      <div class="bs-actions">
          <button class="approve" onclick="bsApprove(this.closest('.bs-approval'))">Approve</button>
          <button class="deny" onclick="bsReject(this.closest('.bs-approval'))">Reject</button>
      </div>`;
  return div;
}

function buildBsQueuedCard(item) {
  const div = document.createElement('div');
  div.className = 'bs-queued';
  div.dataset.token = item.token;
  const turnsNum = parseInt(item.turns_remaining, 10) || 3;
  div.innerHTML = `
      <div class="bs-label">${esc(item.entry_type || item.type || '')}</div>
      <div class="bs-content">${esc(item.content)}</div>
      <div class="bs-turns">${turnsNum} turn${turnsNum !== 1 ? 's' : ''} to review</div>
      <div class="bs-actions">
          <button onclick="bsAdjustOpen(this.closest('.bs-queued'))">Adjust</button>
          <button onclick="bsExclude(this.closest('.bs-queued'))">Exclude</button>
      </div>
      <input class="bs-adjust-input" placeholder="Revised content..." onkeydown="bsAdjustKey(event, this.closest('.bs-queued'))">`;
  return div;
}

function bsApprove(card) {
  const token = card.dataset.token;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'memory_approved', token }));
  }
  card.remove();
  const idx = _pendingMemoryApprovals.findIndex(i => i.token === token);
  if (idx >= 0) _pendingMemoryApprovals.splice(idx, 1);
}

function bsReject(card) {
  const token = card.dataset.token;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'memory_excluded', token }));
  }
  card.remove();
  const idx = _pendingMemoryApprovals.findIndex(i => i.token === token);
  if (idx >= 0) _pendingMemoryApprovals.splice(idx, 1);
}

function bsAdjustOpen(card) {
  const input = card.querySelector('.bs-adjust-input');
  input.style.display = 'block';
  input.focus();
}

function bsAdjustKey(e, card) {
  if (e.key === 'Enter') {
    const token = card.dataset.token;
    const revised = e.target.value.trim();
    if (!revised) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'memory_adjusted', token, revised_content: revised }));
    }
    card.remove();
    const idx = _correctionWindow.findIndex(i => i.token === token);
    if (idx >= 0) _correctionWindow.splice(idx, 1);
  }
}

function bsExclude(card) {
  const token = card.dataset.token;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'memory_excluded', token }));
  }
  card.remove();
  const idx = _correctionWindow.findIndex(i => i.token === token);
  if (idx >= 0) _correctionWindow.splice(idx, 1);
}

// ---- Utils ----

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ---- Init ----

connect();
loadSpecialists();
loadIdentity();
</script>
